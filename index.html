<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERFORMANCE CLIENTE VILA VELHA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .header { background: #08162c; padding: 20px; font-weight: bold; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-header { display: block; font-size: 20px; letter-spacing: 1px; text-transform: uppercase; }

        .container { padding: 15px; max-width: 1600px; margin: auto; }

        /* KPIs */
        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .kpi { 
            background: var(--card); padding: 18px; border-radius: 12px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 4px solid transparent; 
            cursor: pointer; transition: 0.3s; -webkit-tap-highlight-color: transparent;
        }
        .kpi span { font-size: 28px; font-weight: bold; display: block; }
        .label-bottom { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 5px; display: block; }

        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }

        /* Layout de Conteúdo */
        .main-content { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; flex-direction: column;
        }
        .card h3 { margin: 0 0 20px 0; font-size: 14px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid var(--blue); padding-left: 10px; }
        
        .chart-container-no-scroll { width: 100%; flex-grow: 1; min-height: 350px; }
        .chart-wrapper { height: 100%; width: 100%; position: relative; }

        .visitas-content { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .visitas-num { font-size: 85px; font-weight: bold; color: var(--blue); line-height: 1; }
        .visitas-label { font-weight: bold; color: #94a3b8; letter-spacing: 3px; font-size: 11px; margin-top: 15px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { 
            background: var(--card); margin: 5% auto; padding: 25px; 
            width: 90%; max-width: 800px; max-height: 80vh; border-radius: 20px; 
            border: 1px solid var(--blue); position: relative; overflow-y: auto;
        }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #64748b; }

        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(4, 1fr); }
            .main-content { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: 1fr; }
            .card { height: 450px; }
            .titulo-header { font-size: 24px; }
        }
    </style>
</head>

<body>

    <div class="header">
        <span class="titulo-header">PERFORMANCE CLIENTE VILA VELHA</span>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')">
                <span id="totalClientes">0</span>
                <strong class="label-bottom">Total Clientes</strong>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <span id="countExcelente">0</span>
                <strong class="label-bottom">Excelente</strong>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <span id="countBom">0</span>
                <strong class="label-bottom">Bom</strong>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <span id="countInsatisfeito">0</span>
                <strong class="label-bottom">Insatisfeito</strong>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3>FEEDBACK</h3>
                <div class="chart-container-no-scroll">
                    <div id="wrapper" class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Visitas Realizadas</h3>
                <div class="visitas-content">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div class="visitas-label">CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--blue); margin-top: 0; font-size: 18px; border-bottom: 1px solid rgba(59,130,246,0.3); padding-bottom: 10px; margin-bottom: 15px;"></h2>
            <div id="modalBody" style="line-height: 1.6; color: #cbd5e1; font-size: 14px;"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = function() {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { header: true, skipEmptyLines: true, complete: (r) => processar(r.data) });
            });
        };

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "N/A") return "---";
            const data = new Date(dataStr);
            if (isNaN(data.getTime())) return dataStr;
            return `${String(data.getDate()).padStart(2,'0')}/${String(data.getMonth()+1).padStart(2,'0')}/${data.getFullYear()}`;
        }

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem relato.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let dataV = formatarDataBR(getVal(row, "data"));

                if (!cliente) return;
                listasPorCategoria.Total.push(cliente);
                
                let cor = "#3b82f6";
                let alturaBarra = 7; // Padrão "Bom"

                if (exp.includes("excelente")) { 
                    kpi.exc++; cor = "#10b981"; alturaBarra = 10; listasPorCategoria.Excelente.push(cliente); 
                }
                else if (exp.includes("insat") || exp.includes("ruim")) { 
                    kpi.ins++; cor = "#ef4444"; alturaBarra = 4; listasPorCategoria.Insatisfeito.push(cliente); 
                }
                else { 
                    kpi.bom++; cor = "#3b82f6"; alturaBarra = 7; listasPorCategoria.Bom.push(cliente); 
                }

                if (feedback.length > 5) kpi.visitas++;
                baseDeDados.push({ nome: cliente, data: dataV, texto: feedback, cor: cor, valor: alturaBarra });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        data: baseDeDados.map(d => d.valor),
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 4,
                        barPercentage: 0.4,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false, stacked: true, max: 12 },
                        x: { 
                            stacked: true, 
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 9, weight: '600' }, maxRotation: 45, minRotation: 45 } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { enabled: true }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = baseDeDados[el[0].index];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerHTML = `
                                <div style="color: var(--blue); font-weight: bold; font-size: 12px; margin-bottom: 10px;">DATA: ${d.data}</div>
                                ${d.texto}
                            `;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Lista de Clientes: " + cat;
            document.getElementById("modalBody").innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px;">
                    ${lista.map(item => `<div>• ${item}</div>`).join('')}
                </div>
            `;
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
