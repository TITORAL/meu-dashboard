<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERFORMANCE CLIENTE VILA VELHA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .header { background: #08162c; padding: 12px; font-weight: bold; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-header { display: block; font-size: 16px; letter-spacing: 1px; text-transform: uppercase; }

        .container { padding: 10px; max-width: 1600px; margin: auto; }

        /* KPIs */
        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .kpi { 
            background: var(--card); padding: 12px 5px; border-radius: 10px; text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 3px solid transparent; 
            cursor: pointer;
        }
        .kpi span { font-size: 26px; font-weight: bold; display: block; }
        .label-bottom { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 4px; display: block; }

        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }
        .cancelado { border-color: #64748b; color: #94a3b8; }

        .main-content { display: flex; flex-direction: column; gap: 12px; }
        
        .card-feedback { 
            background: var(--card); padding: 15px; border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: flex; flex-direction: column;
            min-height: 420px; 
        }

        .card-visitas { 
            background: var(--card); padding: 10px 15px; border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); display: flex; flex-direction: row;
            align-items: center; justify-content: space-between; min-height: 60px;
        }

        .card h3 { margin: 0; font-size: 11px; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--blue); padding-left: 8px; }
        .card-feedback h3 { margin-bottom: 12px; }

        .chart-container { width: 100%; flex-grow: 1; min-height: 350px; overflow-x: auto; overflow-y: hidden; }
        .chart-wrapper { height: 100%; min-width: 1000px; position: relative; padding-bottom: 20px; } 

        .visitas-content { display: flex; align-items: center; gap: 10px; }
        .visitas-num { font-size: 32px; font-weight: bold; color: var(--blue); line-height: 1; }
        .visitas-label { font-weight: bold; color: #94a3b8; letter-spacing: 1px; font-size: 9px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
        .modal-content { 
            background: var(--card); margin: 5% auto; padding: 20px; 
            width: 85%; max-width: 800px; max-height: 85vh; border-radius: 15px; 
            border: 1px solid var(--blue); position: relative; overflow-y: auto;
        }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; color: #64748b; padding: 5px; }

        .cliente-item-detalhe { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--blue); }
        .cliente-item-detalhe strong { color: var(--blue); display: block; font-size: 16px; margin-bottom: 5px; }
        .cliente-item-detalhe p { margin: 2px 0; font-size: 13px; color: #cbd5e1; }

        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(5, 1fr); gap: 12px; }
            .main-content { display: grid; grid-template-columns: 1fr 280px; grid-template-rows: 480px; }
            .card-visitas { flex-direction: column; justify-content: center; min-height: 480px; }
            .chart-wrapper { min-width: 100%; } 
            .visitas-num { font-size: 100px; }
            .visitas-content { flex-direction: column; flex-grow: 1; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="titulo-header">PERFORMANCE CLIENTE VILA VELHA</span>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi" style="cursor: default;">
                <span id="totalClientes">0</span>
                <strong class="label-bottom">Clientes</strong>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <span id="countExcelente">0</span>
                <strong class="label-bottom">Excelente</strong>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <span id="countBom">0</span>
                <strong class="label-bottom">Bom</strong>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <span id="countInsatisfeito">0</span>
                <strong class="label-bottom">Insatisfeito</strong>
            </div>
            <div class="kpi cancelado" onclick="showCategory('Cancelado')">
                <span id="countCancelado">0</span>
                <strong class="label-bottom">Cancelados</strong>
            </div>
        </div>

        <div class="main-content">
            <div class="card card-feedback">
                <h3>FEEDBACK</h3>
                <div class="chart-container">
                    <div id="wrapper" class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card card-visitas">
                <h3>Visitas Técnicas</h3>
                <div class="visitas-content">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div class="visitas-label">CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--blue); margin-top: 0; font-size: 18px; border-bottom: 1px solid rgba(59,130,246,0.3); padding-bottom: 10px; margin-bottom: 15px;"></h2>
            <div id="modalBody" style="line-height: 1.6; color: #cbd5e1; font-size: 14px;"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = function() {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { header: true, skipEmptyLines: true, complete: (r) => processar(r.data) });
            });
        };

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "N/A") return "---";
            const data = new Date(dataStr);
            if (isNaN(data.getTime())) return dataStr;
            return `${String(data.getDate()).padStart(2,'0')}/${String(data.getMonth()+1).padStart(2,'0')}/${data.getFullYear()}`;
        }

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, can: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "";
                if (!cliente || cliente.trim() === "") return;

                let info = {
                    nome: cliente,
                    endereco: getVal(row, "endereço") || "---",
                    numero: getVal(row, "número") || "---",
                    bairro: getVal(row, "bairro") || "---",
                    celular: getVal(row, "celular") || "---",
                    cpf: getVal(row, "cpf") || getVal(row, "cnpj") || getVal(row, "cpf/cnpj") || "---",
                    abertura: getVal(row, "abertura") || "---",
                    feedback: getVal(row, "feedback") || getVal(row, "relato") || "Sem relato.",
                    data: formatarDataBR(getVal(row, "data"))
                };

                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let cor = "#3b82f6";
                let alturaBarra = 7;

                // Lógica de Categorização Robusta
                if (exp.includes("cancel")) {
                    kpi.can++; cor = "#64748b"; alturaBarra = 2; listasPorCategoria.Cancelado.push(info);
                } else if (exp.includes("excelente")) { 
                    kpi.exc++; cor = "#10b981"; alturaBarra = 10; listasPorCategoria.Excelente.push(info); 
                } else if (exp.includes("insat") || exp.includes("ruim") || exp.includes("péssimo")) { 
                    kpi.ins++; cor = "#ef4444"; alturaBarra = 4; listasPorCategoria.Insatisfeito.push(info); 
                } else { 
                    // Se não cair em nada acima, vai para "BOM" por padrão para não sumir da lista
                    kpi.bom++; cor = "#3b82f6"; alturaBarra = 7; listasPorCategoria.Bom.push(info); 
                }

                if (info.feedback && info.feedback.length > 5) kpi.visitas++;
                baseDeDados.push({ ...info, cor: cor, valor: alturaBarra });
            });

            // Atualiza KPI Total com a contagem real processada
            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("countCancelado").innerText = kpi.can;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        data: baseDeDados.map(d => d.valor),
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 4, 
                        barPercentage: 0.8, 
                        categoryPercentage: 0.9
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { display: false, max: 12 },
                        x: { 
                            grid: { display: false }, 
                            ticks: { 
                                color: '#94a3b8', 
                                font: { size: 9, weight: '600' }, 
                                maxRotation: 90, 
                                minRotation: 90, 
                                autoSkip: false 
                            } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => baseDeDados[context.dataIndex].feedback.substring(0, 50) + "..."
                            }
                        }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = baseDeDados[el[0].index];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerHTML = `<div style="color:var(--blue); font-weight:bold; margin-bottom:10px;">DATA: ${d.data}</div>${d.feedback}`;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Lista Detalhada: " + cat;
            
            let html = "";
            if(lista.length === 0) {
                html = "<p style='text-align:center; padding:20px;'>Nenhum cliente encontrado nesta categoria.</p>";
            } else {
                lista.forEach(item => {
                    html += `
                        <div class="cliente-item-detalhe">
                            <strong>${item.nome}</strong>
                            <p>📍 Endereço: ${item.endereco}, ${item.numero}</p>
                            <p>🏘️ Bairro: ${item.bairro}</p>
                            <p>📱 Celular: ${item.celular}</p>
                            <p>📄 CPF/CNPJ: ${item.cpf}</p>
                            <p>📅 Abertura: ${item.abertura}</p>
                        </div>
                    `;
                });
            }
            
            document.getElementById("modalBody").innerHTML = html;
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
