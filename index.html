<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Vila Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #08162c; padding: 10px; font-weight: bold; text-align: center; border-bottom: 2px solid var(--blue); flex-shrink: 0; }
        .titulo-pc { font-size: 18px; letter-spacing: 1px; }

        .container { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; box-sizing: border-box; }
        
        /* KPIs Compactos */
        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; flex-shrink: 0; }
        .kpi { background: var(--card); padding: 8px; border-radius: 8px; text-align: center; border-bottom: 2px solid transparent; cursor: pointer; }
        .kpi span { font-size: 18px; font-weight: bold; display: block; }
        .label-bottom { font-size: 8px; font-weight: bold; text-transform: uppercase; color: #94a3b8; }
        
        .excelente { color: #10b981; border-color: #10b981; }
        .bom { color: var(--blue); border-color: var(--blue); }
        .insatisfeito { color: #ef4444; border-color: #ef4444; }

        /* Main Content Ajustado */
        .main-content { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        
        .card { background: var(--card); padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; }
        .card h3 { margin: 0 0 10px 0; font-size: 11px; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        
        /* Redução do Gráfico para sobrar espaço */
        .chart-container-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chart-wrapper { height: 220px; min-width: 100%; position: relative; }

        /* Card de Visitas Compacto */
        .visitas-box { text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px 0; }
        .visitas-num { font-size: 40px; font-weight: bold; color: var(--blue); line-height: 1; }
        .visitas-label { font-weight: bold; color: #94a3b8; letter-spacing: 1px; font-size: 10px; margin-top: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 20px; width: 80%; border-radius: 15px; border: 1px solid var(--blue); }

        /* Desktop Layout */
        @media (min-width: 992px) { 
            .main-content { display: grid; grid-template-columns: 7.5fr 2.5fr; max-height: 400px; } 
            .chart-wrapper { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="titulo-pc">PERFORMANCE VILA VELHA</span>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')"><strong class="label-bottom">Total</strong><span id="totalClientes">0</span></div>
            <div class="kpi excelente" onclick="showCategory('Excelente')"><strong class="label-bottom">Exc</strong><span id="countExcelente">0</span></div>
            <div class="kpi bom" onclick="showCategory('Bom')"><strong class="label-bottom">Bom</strong><span id="countBom">0</span></div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')"><strong class="label-bottom">Ins</strong><span id="countInsatisfeito">0</span></div>
        </div>

        <div class="main-content">
            <div class="card" style="flex: 2;">
                <h3>FEEDBACK</h3>
                <div class="chart-container-scroll">
                    <div class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card" style="flex: 1;">
                <h3>Visitas</h3>
                <div class="visitas-box">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div class="visitas-label">CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer;" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--blue); font-size: 18px;"></h2>
            <div id="modalBody" style="font-size: 14px; color: #cbd5e1;"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "N/A") return "Data N/A";
            const data = new Date(dataStr);
            return isNaN(data.getTime()) ? dataStr : data.toLocaleDateString('pt-BR');
        }

        window.onload = function() {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { header: true, skipEmptyLines: true, complete: (r) => processar(r.data) });
            });
        };

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem relato.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let dataV = formatarDataBR(getVal(row, "data"));
                if (!cliente) return;

                listasPorCategoria.Total.push(cliente);
                let cat = "Bom", valor = 6;
                if (exp.includes("excelente")) { kpi.exc++; cat = "Excelente"; valor = 10; listasPorCategoria.Excelente.push(cliente); }
                else if (exp.includes("bom")) { kpi.bom++; cat = "Bom"; valor = 6; listasPorCategoria.Bom.push(cliente); }
                else if (exp.includes("insat") || exp.includes("ruim")) { kpi.ins++; cat = "Insatisfeito"; valor = 3; listasPorCategoria.Insatisfeito.push(cliente); }

                if (feedback.length > 5) kpi.visitas++;
                baseDeDados.push({ nome: cliente, data: dataV, texto: feedback, categoria: cat, valor: valor });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            const wrapper = document.querySelector('.chart-wrapper');
            const larguraMinima = baseDeDados.length * 50; 
            wrapper.style.minWidth = larguraMinima < 600 ? "100%" : larguraMinima + "px";

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [
                        { label: 'Excelente', data: baseDeDados.map(d => d.categoria === 'Excelente' ? d.valor : 0), backgroundColor: '#10b981', borderRadius: 5, barPercentage: 0.4 },
                        { label: 'Bom', data: baseDeDados.map(d => d.categoria === 'Bom' ? d.valor : 0), backgroundColor: '#3b82f6', borderRadius: 5, barPercentage: 0.4 },
                        { label: 'Insatisfeito', data: baseDeDados.map(d => d.categoria === 'Insatisfeito' ? d.valor : 0), backgroundColor: '#ef4444', borderRadius: 5, barPercentage: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { stacked: true, display: false, min: 0, max: 12 },
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45 } }
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            const d = baseDeDados[i];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerText = d.texto;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = cat;
            document.getElementById("modalBody").innerHTML = lista.join("<br>");
            document.getElementById("feedbackModal").style.display = "block";
        }
        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
    </script>
</body>
</html>
