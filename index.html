<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERFORMANCE CLIENTE VILA VELHA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .header { background: #08162c; padding: 20px; font-weight: bold; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-header { display: block; font-size: 22px; letter-spacing: 1px; text-transform: uppercase; }

        .container { padding: 15px; max-width: 1600px; margin: auto; }
        .status-msg { text-align: center; padding: 5px; font-size: 11px; color: var(--blue); margin-bottom: 10px; opacity: 0.6; text-transform: uppercase; }

        /* KPIs */
        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .kpi { 
            background: var(--card); padding: 18px; border-radius: 12px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 4px solid transparent; 
            cursor: pointer; transition: all 0.3s ease;
        }
        .kpi:active { transform: scale(0.95); }
        .kpi span { font-size: 32px; font-weight: bold; display: block; }
        .label-bottom { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 5px; display: block; }

        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }

        /* Main Content */
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card h3 { margin: 0 0 20px 0; font-size: 14px; color: var(--blue); text-transform: uppercase; letter-spacing: 2px; border-left: 4px solid var(--blue); padding-left: 10px; }
        
        /* Gráfico com Scroll */
        .chart-container-scroll { width: 100%; overflow-x: auto; scrollbar-width: thin; scrollbar-color: var(--blue) var(--card); }
        .chart-wrapper { height: 380px; position: relative; }

        .visitas-box { padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .visitas-num { font-size: 80px; font-weight: bold; color: var(--blue); line-height: 1; }
        .visitas-label { font-weight: bold; color: #94a3b8; letter-spacing: 3px; font-size: 12px; margin-top: 10px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { 
            background: var(--card); margin: 10% auto; padding: 30px; 
            width: 85%; max-width: 500px; border-radius: 20px; border: 1px solid rgba(59, 130, 246, 0.5); position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; color: #64748b; }

        /* Responsividade Desktop */
        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(4, 1fr); }
            .main-content { display: grid; grid-template-columns: 1fr 320px; }
            .titulo-header { font-size: 26px; }
        }
    </style>
</head>

<body>

    <div class="header">
        <span class="titulo-header">PERFORMANCE CLIENTE VILA VELHA</span>
    </div>

    <div class="container">
        <div id="status" class="status-msg">Sincronizando dados...</div>

        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')">
                <span id="totalClientes">0</span>
                <strong class="label-bottom">Total Clientes</strong>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <span id="countExcelente">0</span>
                <strong class="label-bottom">Excelente</strong>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <span id="countBom">0</span>
                <strong class="label-bottom">Bom</strong>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <span id="countInsatisfeito">0</span>
                <strong class="label-bottom">Insatisfeito</strong>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3>FEEDBACK</h3>
                <div class="chart-container-scroll">
                    <div id="wrapper" class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Visitas Realizadas</h3>
                <div class="visitas-box">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div class="visitas-label">CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--blue); margin-top: 0; font-size: 20px;"></h2>
            <div id="modalBody" style="line-height: 1.6; color: #cbd5e1; font-size: 16px;"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = function() {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (r) => processar(r.data)
                });
            });
        };

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "N/A") return "Data não informada";
            const data = new Date(dataStr);
            if (isNaN(data.getTime())) return dataStr;
            const dia = String(data.getDate()).padStart(2, '0');
            const mes = String(data.getMonth() + 1).padStart(2, '0');
            const ano = data.getFullYear();
            return `${dia}/${mes}/${ano}`;
        }

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem relato registrado.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let dataV = formatarDataBR(getVal(row, "data"));

                if (!cliente) return;

                listasPorCategoria.Total.push(cliente);
                let cor = "#3b82f6";
                
                if (exp.includes("excelente")) { kpi.exc++; cor = "#10b981"; listasPorCategoria.Excelente.push(cliente); }
                else if (exp.includes("bom")) { kpi.bom++; cor = "#3b82f6"; listasPorCategoria.Bom.push(cliente); }
                else if (exp.includes("insat") || exp.includes("ruim")) { kpi.ins++; cor = "#ef4444"; listasPorCategoria.Insatisfeito.push(cliente); }

                if (feedback.length > 5) kpi.visitas++;
                baseDeDados.push({ nome: cliente, data: dataV, texto: feedback, cor: cor });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;
            document.getElementById("status").innerText = "Dados Atualizados";

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            const wrapper = document.getElementById("wrapper");
            
            // Ajuste dinâmico de largura para permitir scroll elegante no mobile
            const larguraCalculada = baseDeDados.length * 60;
            wrapper.style.minWidth = larguraCalculada > window.innerWidth ? larguraCalculada + "px" : "100%";

            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        data: baseDeDados.map(() => 10),
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 6,
                        barPercentage: 0.7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false, max: 12 },
                        x: { 
                            grid: { display: false },
                            ticks: { 
                                color: '#94a3b8', 
                                font: { size: 11, weight: '500' }, 
                                maxRotation: 45, 
                                minRotation: 45 
                            } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(8, 22, 44, 0.95)',
                            titleFont: { size: 14 },
                            bodyFont: { size: 12 },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                title: (items) => baseDeDados[items[0].dataIndex].nome,
                                label: (item) => [
                                    `Data: ${baseDeDados[item.dataIndex].data}`,
                                    `Status: ${baseDeDados[item.dataIndex].cor === '#10b981' ? 'Excelente' : baseDeDados[item.dataIndex].cor === '#ef4444' ? 'Insatisfeito' : 'Bom'}`,
                                    ``,
                                    `Clique para ler o feedback`
                                ]
                            }
                        }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            const d = baseDeDados[i];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerHTML = `
                                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #1e3a8a; padding-bottom: 10px; margin-bottom: 15px;">
                                    <span style="font-size: 13px; font-weight: bold; color: var(--blue);">VISITA: ${d.data}</span>
                                </div>
                                <p style="margin: 0;">${d.texto}</p>
                            `;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Lista de Clientes: " + cat;
            document.getElementById("modalBody").innerHTML = lista.length > 0 
                ? "<ul style='padding-left: 20px;'><li>" + lista.join("</li><li>") + "</li></ul>" 
                : "Nenhum cliente encontrado nesta categoria.";
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
