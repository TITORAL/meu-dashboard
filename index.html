<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERFORMANCE - 83 CLIENTES</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { background: #08162c; padding: 12px; text-align: center; border-bottom: 3px solid var(--blue); font-weight: bold; }
        .container { padding: 10px; max-width: 1600px; margin: auto; }

        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .kpi { background: var(--card); padding: 12px 5px; border-radius: 10px; text-align: center; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        .kpi span { font-size: 26px; font-weight: bold; display: block; }
        .label-bottom { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 4px; display: block; }

        .total { border-color: #fff; }
        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }
        .cancelado { border-color: #64748b; color: #94a3b8; }

        .main-content { display: flex; flex-direction: column; gap: 12px; }
        .card-chart { background: var(--card); padding: 15px; border-radius: 12px; min-height: 400px; }
        
        .chart-container { width: 100%; height: 350px; overflow-x: auto; }
        /* Largura aumentada para acomodar 83 clientes sem erro */
        .chart-wrapper { height: 100%; min-width: 4200px; position: relative; } 

        .visitas-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border-left: 4px solid var(--blue); }
        .visitas-num { font-size: 50px; font-weight: bold; color: var(--blue); }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 20px; width: 85%; max-width: 600px; max-height: 80vh; border-radius: 15px; border: 1px solid var(--blue); overflow-y: auto; position: relative; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; }
        
        .cliente-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--blue); }
    </style>
</head>
<body>

    <div class="header">DASHBOARD PERFORMANCE - TOTAL 83 CLIENTES</div>

    <div class="container">
        <div class="kpis">
            <div class="kpi total" onclick="showCategory('Todos')">
                <span id="totalClientes">0</span>
                <strong class="label-bottom">Total Clientes</strong>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <span id="countExcelente">0</span>
                <strong class="label-bottom">Excelente</strong>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <span id="countBom">0</span>
                <strong class="label-bottom">Bom</strong>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <span id="countInsatisfeito">0</span>
                <strong class="label-bottom">Insatisfeito</strong>
            </div>
            <div class="kpi cancelado" onclick="showCategory('Cancelado')">
                <span id="countCancelado">0</span>
                <strong class="label-bottom">Cancelados</strong>
            </div>
        </div>

        <div class="main-content">
            <div class="card-chart">
                <div class="chart-container">
                    <div class="chart-wrapper"><canvas id="clienteChart"></canvas></div>
                </div>
            </div>
            <div class="visitas-card">
                <strong style="font-size: 10px; color: #94a3b8;">CLIENTES COM FEEDBACK</strong>
                <div id="totalVisitas" class="visitas-num">0</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--blue); margin-top: 0; font-size: 18px;"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let categorias = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

        const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv";

        window.onload = () => {
            fetch(URL).then(res => res.text()).then(csv => {
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: 'greedy', 
                    quoteChar: '"', 
                    complete: (r) => processar(r.data)
                });
            });
        };

        function getCol(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(termo.toLowerCase()));
            return key ? String(obj[key]).trim() : "";
        }

        function processar(dados) {
            baseDeDados = [];
            categorias = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };
            let comFeedback = 0;

            dados.forEach(row => {
                // Tenta Fantasia primeiro, depois Nome do Cliente
                let nome = getCol(row, "fantasia") || getCol(row, "nome do cliente") || getCol(row, "cliente");
                
                // Se a linha tiver qualquer dado mas o nome for nulo, pegamos o primeiro valor da linha como nome
                if (!nome) {
                    const vals = Object.values(row).filter(v => v);
                    if (vals.length > 0) nome = vals[0];
                }

                if (!nome || nome.toLowerCase().includes("total")) return;

                let exp = getCol(row, "experiencia").toLowerCase();
                let feedback = getCol(row, "feedback");
                
                let info = {
                    nome: nome,
                    bairro: getCol(row, "bairro") || "---",
                    feedback: feedback || "Nenhum feedback preenchido.",
                    data: getCol(row, "data") || "---"
                };

                let cor = "#3b82f6"; 
                let valor = 7;

                if (exp.includes("cancel")) { 
                    cor = "#64748b"; valor = 2; categorias.Cancelado.push(info); 
                } else if (exp.includes("excelente")) { 
                    cor = "#10b981"; valor = 10; categorias.Excelente.push(info); 
                } else if (exp.includes("insat") || exp.includes("ruim")) { 
                    cor = "#ef4444"; valor = 4; categorias.Insatisfeito.push(info); 
                } else { 
                    categorias.Bom.push(info); 
                }

                if (feedback && feedback.length > 3) comFeedback++;
                
                categorias.Todos.push(info);
                baseDeDados.push({ nome, cor, valor, feedback: info.feedback, data: info.data });
            });

            document.getElementById("totalClientes").innerText = categorias.Todos.length;
            document.getElementById("countExcelente").innerText = categorias.Excelente.length;
            document.getElementById("countBom").innerText = categorias.Bom.length;
            document.getElementById("countInsatisfeito").innerText = categorias.Insatisfeito.length;
            document.getElementById("countCancelado").innerText = categorias.Cancelado.length;
            document.getElementById("totalVisitas").innerText = comFeedback;

            renderizar();
        }

        function renderizar() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();
            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{ data: baseDeDados.map(d => d.valor), backgroundColor: baseDeDados.map(d => d.cor), borderRadius: 2 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { display: false, max: 12 }, 
                        x: { ticks: { color: '#94a3b8', font: { size: 8 }, maxRotation: 90, autoSkip: false } } 
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = baseDeDados[el[0].index];
                            openModal(d.nome, `<p><b>Data:</b> ${d.data}</p><p>${d.feedback}</p>`);
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = categorias[cat];
            let html = "";
            lista.forEach(i => {
                html += `<div class="cliente-item"><strong>${i.nome}</strong><p>📍 Bairro: ${i.bairro}</p></div>`;
            });
            openModal("Lista: " + cat, html || "<p style='text-align:center'>Nenhum registro.</p>");
        }

        function openModal(titulo, conteudo) {
            document.getElementById("modalTitle").innerText = titulo;
            document.getElementById("modalBody").innerHTML = conteudo;
            document.getElementById("modal").style.display = "block";
        }

        function closeModal() { document.getElementById("modal").style.display = "none"; }
    </script>
</body>
</html>
