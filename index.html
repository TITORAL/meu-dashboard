<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERFORMANCE CLIENTE VILA VELHA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { background: #08162c; padding: 12px; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-header { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 10px; max-width: 1600px; margin: auto; }

        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .kpi { background: var(--card); padding: 12px 5px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 3px solid transparent; cursor: pointer; transition: 0.3s; }
        .kpi:hover { background: #1e3a6d; }
        .kpi span { font-size: 26px; font-weight: bold; display: block; }
        .label-bottom { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 4px; display: block; }

        .total { border-color: #fff; }
        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }
        .cancelado { border-color: #64748b; color: #94a3b8; }

        .main-content { display: flex; flex-direction: column; gap: 12px; }
        .card-feedback { background: var(--card); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; min-height: 420px; }
        
        .chart-container { width: 100%; flex-grow: 1; min-height: 350px; overflow-x: auto; }
        .chart-wrapper { height: 100%; min-width: 1200px; position: relative; } 

        .visitas-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border-left: 4px solid var(--blue); display: flex; flex-direction: column; justify-content: center; }
        .visitas-num { font-size: 50px; font-weight: bold; color: var(--blue); display: block; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 20px; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 15px; border: 1px solid var(--blue); position: relative; overflow-y: auto; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; color: #64748b; }
        
        .cliente-item-detalhe { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid var(--blue); cursor: pointer; }
        .cliente-item-detalhe strong { color: var(--text); font-size: 15px; display: block; }

        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(5, 1fr); gap: 12px; }
            .main-content { display: grid; grid-template-columns: 1fr 280px; }
            .chart-wrapper { min-width: 100%; } 
        }
    </style>
</head>
<body>
    <div class="header"><span class="titulo-header">PERFORMANCE CLIENTE VILA VELHA</span></div>
    
    <div class="container">
        <div class="kpis">
            <div class="kpi total" onclick="showCategory('Todos')"><span id="totalClientes">0</span><strong class="label-bottom">Clientes</strong></div>
            <div class="kpi excelente" onclick="showCategory('Excelente')"><span id="countExcelente">0</span><strong class="label-bottom">Excelente</strong></div>
            <div class="kpi bom" onclick="showCategory('Bom')"><span id="countBom">0</span><strong class="label-bottom">Bom</strong></div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')"><span id="countInsatisfeito">0</span><strong class="label-bottom">Insatisfeito</strong></div>
            <div class="kpi cancelado" onclick="showCategory('Cancelado')"><span id="countCancelado">0</span><strong class="label-bottom">Cancelados</strong></div>
        </div>

        <div class="main-content">
            <div class="card card-feedback">
                <div class="chart-container">
                    <div class="chart-wrapper"><canvas id="clienteChart"></canvas></div>
                </div>
            </div>
            <div class="visitas-card">
                <strong style="font-size: 10px; color: #94a3b8; text-transform: uppercase;">Visitas Concluídas</strong>
                <span id="totalVisitas" class="visitas-num">0</span>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color:var(--blue); font-size:18px; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px;"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLMRik-fVqpkumGCnTayN7EuWM7naaE_yCV2RFuyvuJwKli5XdBUDCq6-vu5xcPXZ5g0qLqSWU3ZGX/pub?output=csv"; 

        window.onload = () => {
            fetch(URL_PLANILHA)
                .then(res => res.text())
                .then(csv => {
                    Papa.parse(csv, { 
                        header: true, 
                        skipEmptyLines: true,
                        complete: (r) => { processar(r.data); }
                    });
                })
                .catch(err => console.error("Erro ao carregar planilha:", err));
        };

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "---") return "---";
            const partes = dataStr.split(/[-/]/);
            if (partes.length === 3) {
                if (partes[0].length === 4) return `${partes[2]}/${partes[1]}/${partes[0]}`;
                return `${partes[0]}/${partes[1]}/${partes[2]}`;
            }
            return dataStr;
        }

        function processar(dados) {
            baseDeDados = [];
            listasPorCategoria = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };
            let visitasCount = 0;

            dados.forEach(row => {
                const getVal = (names) => {
                    for (let n of names) {
                        let val = row[n] || row[n.trim()];
                        if (val !== undefined && val !== null) return val.toString().trim();
                    }
                    return "";
                };

                let fantasia = getVal(["Cliente", "Fantasia"]);
                if (!fantasia || fantasia.toLowerCase().includes("total")) return;

                let feedback = getVal(["Feedback ", "Feedback"]);
                let expOriginal = getVal(["Experiência ", "Experiencia"]);
                let expLimpa = expOriginal.toLowerCase();

                let info = {
                    fantasia: fantasia,
                    feedback: feedback || "Sem feedback registrado.",
                    data: formatarDataBR(getVal(["Data", "DATA"])),
                    responsavel: getVal(["Responsável", "Responsavel"]) || "---",
                    endereco: getVal(["Endereco", "Endereço"]) || "---",
                    numero: getVal(["Número", "Numero"]) || "---",
                    bairro: getVal(["Bairro"]) || "---",
                    celular: getVal(["Celular"]) || "---",
                    cpf: getVal(["CPF"]) || "---",
                    abertura: formatarDataBR(getVal(["Abertura"])) || "---"
                };

                listasPorCategoria.Todos.push(info);
                if (feedback && feedback.length > 3) visitasCount++;

                // Lógica de classificação: só entra nas categorias se 'expOriginal' não estiver vazio
                if (expOriginal !== "") {
                    let cor = "#3b82f6"; 
                    let valorGrafico = 6;

                    if (expLimpa.includes("exce")) { 
                        cor = "#10b981"; valorGrafico = 10; listasPorCategoria.Excelente.push(info); 
                    } else if (expLimpa.includes("insat") || expLimpa.includes("ruim")) { 
                        cor = "#ef4444"; valorGrafico = 4; listasPorCategoria.Insatisfeito.push(info); 
                    } else if (expLimpa.includes("canc")) { 
                        cor = "#64748b"; valorGrafico = 2; listasPorCategoria.Cancelado.push(info); 
                    } else {
                        listasPorCategoria.Bom.push(info);
                    }
                    baseDeDados.push({ ...info, cor, valor: valorGrafico });
                }
            });

            document.getElementById("totalClientes").innerText = listasPorCategoria.Todos.length;
            document.getElementById("countExcelente").innerText = listasPorCategoria.Excelente.length;
            document.getElementById("countBom").innerText = listasPorCategoria.Bom.length;
            document.getElementById("countInsatisfeito").innerText = listasPorCategoria.Insatisfeito.length;
            document.getElementById("countCancelado").innerText = listasPorCategoria.Cancelado.length;
            document.getElementById("totalVisitas").innerText = visitasCount;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();
            const dadosComVisita = baseDeDados.filter(d => d.feedback !== "Sem feedback registrado.");
            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dadosComVisita.map(d => d.fantasia),
                    datasets: [{ 
                        data: dadosComVisita.map(d => d.valor), 
                        backgroundColor: dadosComVisita.map(d => d.cor),
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    scales: { 
                        y: { beginAtZero: true, max: 12, ticks: { display: false }, grid: { display: false } }, 
                        x: { ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45 } } 
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = dadosComVisita[el[0].index];
                            showDetailsGrafico(d);
                        }
                    }
                }
            });
        }

        function showDetailsGrafico(d) {
            openModal(d.fantasia, `
                <div class="info-grid">
                    <p style="font-size:15px; line-height:1.6;"><b>Feedback:</b><br>${d.feedback}</p>
                    <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                    <p><b>Data da Visita:</b> ${d.data}</p>
                </div>
            `);
        }

        function showClientData(info) {
            openModal(info.fantasia, `
                <div class="info-grid">
                    <p><b>Responsável:</b> ${info.responsavel}</p>
                    <p><b>Bairro:</b> ${info.bairro}</p>
                    <p><b>Endereço:</b> ${info.endereco}, ${info.numero}</p>
                    <p><b>Celular:</b> ${info.celular}</p>
                    <p><b>CPF:</b> ${info.cpf}</p>
                    <p><b>Abertura:</b> ${info.abertura}</p>
                </div>
            `);
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            let html = "";
            lista.forEach((i) => {
                if (cat === 'Todos') {
                    html += `
                        <div class="cliente-item-detalhe" onclick='showClientData(${JSON.stringify(i).replace(/'/g, "&apos;")})'>
                            <strong>${i.fantasia}</strong>
                        </div>`;
                } else {
                    html += `
                        <div class="cliente-item-detalhe">
                            <strong>${i.fantasia}</strong>
                        </div>`;
                }
            });
            openModal("Lista: " + cat, html || "<p style='text-align:center'>Nenhum registro encontrado.</p>");
        }

        function openModal(titulo, conteudo) {
            document.getElementById("modalTitle").innerText = titulo;
            document.getElementById("modalBody").innerHTML = conteudo;
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (event) => { if (event.target == document.getElementById("feedbackModal")) closeModal(); }
    </script>
</body>
</html>
