<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RELACIONAMENTO CLIENTE VILA VELHA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .header { background: #08162c; padding: 15px; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-header { font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        
        .container { padding: 12px; max-width: 100%; margin: auto; }

        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .kpi { background: var(--card); padding: 15px 8px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border-bottom: 3px solid transparent; cursor: pointer; }
        .kpi span { font-size: 24px; font-weight: bold; display: block; }
        .label-bottom { font-size: 9px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 4px; display: block; }

        .total { border-color: #fff; }
        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }
        .cancelado { border-color: #64748b; color: #94a3b8; }
        
        .neon-text { filter: drop-shadow(0 0 3px rgba(255,255,255,0.4)); color: var(--blue); }

        .main-content { display: flex; flex-direction: column; gap: 12px; }
        .card-feedback { background: var(--card); padding: 12px; border-radius: 12px; min-height: 380px; }
        
        .chart-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chart-wrapper { height: 320px; min-width: 900px; } 

        .visitas-card-desktop { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border-left: 4px solid var(--blue); display: flex; flex-direction: column; justify-content: center; min-height: 150px; }
        .visitas-num-large { font-size: 45px; font-weight: bold; display: block; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 20px; width: 85%; max-height: 80vh; border-radius: 15px; border: 1px solid var(--blue); position: relative; overflow-y: auto; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #94a3b8; }
        
        .cliente-item-detalhe { background: rgba(255,255,255,0.05); padding: 14px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--blue); }
        .cliente-item-detalhe strong { color: var(--text); font-size: 15px; display: block; }

        @media (max-width: 767px) {
            .visitas-mobile-only { display: block !important; border-color: var(--blue); }
            .visitas-card-desktop { display: none !important; }
        }

        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(5, 1fr); }
            .visitas-mobile-only { display: none !important; }
            .main-content { display: grid; grid-template-columns: 1fr 280px; }
            .visitas-card-desktop { display: flex; }
            .chart-wrapper { min-width: 100%; } 
            .titulo-header { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="header"><span class="titulo-header">RELACIONAMENTO CLIENTE VILA VELHA</span></div>
    
    <div class="container">
        <div class="kpis">
            <div class="kpi total" onclick="showCategory('Todos')"><span id="totalClientes">0</span><strong class="label-bottom">Clientes</strong></div>
            <div class="kpi excelente" onclick="showCategory('Excelente')"><span id="countExcelente">0</span><strong class="label-bottom">Excelente</strong></div>
            <div class="kpi bom" onclick="showCategory('Bom')"><span id="countBom">0</span><strong class="label-bottom">Bom</strong></div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')"><span id="countInsatisfeito">0</span><strong class="label-bottom">Insatisfeito</strong></div>
            <div class="kpi cancelado" onclick="showCategory('Cancelado')"><span id="countCancelado">0</span><strong class="label-bottom">Cancelados</strong></div>
            <div class="kpi visitas-mobile-only">
                <span id="totalVisitasMob" class="neon-text">0</span>
                <strong class="label-bottom">Visitas Concluídas</strong>
            </div>
        </div>

        <div class="main-content">
            <div class="card card-feedback">
                <div class="chart-container">
                    <div class="chart-wrapper"><canvas id="clienteChart"></canvas></div>
                </div>
            </div>
            <div class="visitas-card-desktop">
                <strong style="font-size: 10px; color: #94a3b8; text-transform: uppercase;">Visitas Concluídas</strong>
                <span id="totalVisitasDesk" class="visitas-num-large neon-text">0</span>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color:var(--blue); font-size:16px; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px;"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLMRik-fVqpkumGCnTayN7EuWM7naaE_yCV2RFuyvuJwKli5XdBUDCq6-vu5xcPXZ5g0qLqSWU3ZGX/pub?output=csv"; 

        window.onload = () => {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { header: true, skipEmptyLines: true, complete: (r) => { processar(r.data); } });
            });
        };

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "---") return "---";
            const partes = dataStr.split(/[-/]/);
            if (partes.length === 3) {
                // Se o primeiro item tiver 4 dígitos, é YYYY-MM-DD
                if (partes[0].length === 4) return `${partes[2]}/${partes[1]}/${partes[0]}`;
                // Senão, assume que já está próximo do formato ou é DD-MM-YYYY
                return `${partes[0]}/${partes[1]}/${partes[2]}`;
            }
            return dataStr;
        }

        function processar(dados) {
            baseDeDados = [];
            listasPorCategoria = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };
            let visitasCount = 0;

            dados.forEach(row => {
                const getVal = (names) => {
                    for (let n of names) { let val = row[n] || row[n.trim()]; if (val) return val.toString().trim(); }
                    return "";
                };
                let fantasia = getVal(["Cliente", "Fantasia"]);
                if (!fantasia || fantasia.toLowerCase().includes("total")) return;
                
                let feedback = getVal(["Feedback ", "Feedback"]);
                let expOriginal = getVal(["Experiência ", "Experiencia"]);
                let expLimpa = expOriginal.toLowerCase();

                let info = {
                    fantasia: fantasia,
                    feedback: feedback || "Sem feedback registrado.",
                    data: formatarDataBR(getVal(["Data", "DATA"])),
                    responsavel: getVal(["Responsável", "Responsavel"]) || "---",
                    endereco: getVal(["Endereco", "Endereço"]) || "---",
                    numero: getVal(["Número", "Numero"]) || "---",
                    bairro: getVal(["Bairro"]) || "---",
                    celular: getVal(["Celular"]) || "---",
                    cpf: getVal(["CPF"]) || "---",
                    abertura: formatarDataBR(getVal(["Abertura"])) || "---"
                };

                listasPorCategoria.Todos.push(info);
                if (feedback && feedback.length > 3) visitasCount++;

                if (expOriginal !== "") {
                    let cor = "#3b82f6", valor = 6;
                    if (expLimpa.includes("exce")) { cor = "#10b981"; valor = 10; listasPorCategoria.Excelente.push(info); }
                    else if (expLimpa.includes("insat")) { cor = "#ef4444"; valor = 4; listasPorCategoria.Insatisfeito.push(info); }
                    else if (expLimpa.includes("canc")) { cor = "#64748b"; valor = 2; listasPorCategoria.Cancelado.push(info); }
                    else { listasPorCategoria.Bom.push(info); }
                    baseDeDados.push({ ...info, cor, valor });
                }
            });

            const sortFn = (a, b) => a.fantasia.localeCompare(b.fantasia);
            Object.keys(listasPorCategoria).forEach(k => listasPorCategoria[k].sort(sortFn));
            baseDeDados.sort(sortFn);

            document.getElementById("totalClientes").innerText = listasPorCategoria.Todos.length;
            document.getElementById("countExcelente").innerText = listasPorCategoria.Excelente.length;
            document.getElementById("countBom").innerText = listasPorCategoria.Bom.length;
            document.getElementById("countInsatisfeito").innerText = listasPorCategoria.Insatisfeito.length;
            document.getElementById("countCancelado").innerText = listasPorCategoria.Cancelado.length;
            document.getElementById("totalVisitasMob").innerText = visitasCount;
            document.getElementById("totalVisitasDesk").innerText = visitasCount;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();
            const df = baseDeDados.filter(d => d.feedback !== "Sem feedback registrado.");
            
            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: df.map(d => d.fantasia),
                    datasets: [{ 
                        data: df.map(d => d.valor), 
                        backgroundColor: df.map(d => d.cor), 
                        borderRadius: 4,
                        barPercentage: 0.6,
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { display: false, max: 12 }, 
                        x: { ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 45 } } 
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => { if (el.length > 0) showDetailsGrafico(df[el[0].index]); }
                }
            });
        }

        // AJUSTE REALIZADO AQUI: A data exibida agora usa o formato brasileiro (dia/mês/ano)
        function showDetailsGrafico(d) {
            openModal(d.fantasia, `<p style="font-size:14px; line-height:1.5;"><b>Feedback:</b><br>${d.feedback}</p><p><b>Data da Visita:</b> ${d.data}</p>`);
        }

        function showClientData(info) {
            openModal(info.fantasia, `<div class="info-grid"><p><b>Responsável:</b> ${info.responsavel}</p><p><b>Bairro:</b> ${info.bairro}</p><p><b>Endereço:</b> ${info.endereco}, ${info.numero}</p><p><b>Celular:</b> ${info.celular}</p><p><b>CPF:</b> ${info.cpf}</p><p><b>Abertura:</b> ${info.abertura}</p></div>`);
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            let html = "";
            lista.forEach((i) => {
                const click = cat === 'Todos' ? `onclick='showClientData(${JSON.stringify(i).replace(/'/g, "&apos;")})'` : "";
                html += `<div class="cliente-item-detalhe" ${click}><strong>${i.fantasia}</strong></div>`;
            });
            openModal("Lista: " + cat, html || "<p>Nenhum registro.</p>");
        }

        function openModal(t, c) { document.getElementById("modalTitle").innerText = t; document.getElementById("modalBody").innerHTML = c; document.getElementById("feedbackModal").style.display = "block"; }
        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
    </script>
</body>
</html>
