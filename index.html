<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Performance - Relacionamento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b1f3a; color: white; }
        .header { background: #08162c; padding: 25px; font-size: 28px; font-weight: bold; text-align: center; border-bottom: 3px solid #3b82f6; }
        .container { padding: 30px; max-width: 1600px; margin: auto; }
        .status-msg { text-align: center; padding: 10px; font-size: 14px; color: #3b82f6; margin-bottom: 10px; }

        /* KPIs */
        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi { 
            background: #142a52; padding: 20px; border-radius: 15px; text-align: center; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); border-bottom: 4px solid transparent; 
            cursor: pointer; transition: 0.3s;
        }
        .kpi:hover { transform: translateY(-5px); background: #1c3a6e; }
        .kpi span { font-size: 38px; font-weight: bold; display: block; }
        .label-bottom { font-size: 13px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; display: block; }

        .excelente { color: #10b981; border-color: #10b981; }
        .bom { color: #3b82f6; border-color: #3b82f6; }
        .insatisfeito { color: #ef4444; border-color: #ef4444; }

        /* Layout Gráfico + Visitas */
        .main-content { display: grid; grid-template-columns: 1fr 300px; gap: 25px; }
        .card { background: #142a52; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .card h3 { margin: 0 0 20px 0; font-size: 18px; color: #3b82f6; text-transform: uppercase; letter-spacing: 1px; }
        
        .chart-wrapper { height: 450px; position: relative; }

        .visitas-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; }
        .visitas-num { font-size: 80px; font-weight: bold; color: #3b82f6; line-height: 1; }
        .visitas-label { font-size: 14px; color: #94a3b8; font-weight: bold; margin-top: 10px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #142a52; margin: 10% auto; padding: 30px; border: 1px solid #3b82f6; width: 450px; border-radius: 20px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #64748b; }
        .close-btn:hover { color: #ef4444; }
        
        #modalList { list-style: none; padding: 0; margin-top: 15px; max-height: 300px; overflow-y: auto; }
        #modalList li { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    </style>
</head>

<body>

    <div class="header">PERFORMANCE DE RELACIONAMENTO</div>

    <div class="container">
        <div id="status" class="status-msg">Conectando à base de dados...</div>

        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')">
                <strong class="label-bottom">Total de Clientes</strong>
                <span id="totalClientes">0</span>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <strong class="label-bottom">Excelente</strong>
                <span id="countExcelente">0</span>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <strong class="label-bottom">Bom</strong>
                <span id="countBom">0</span>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <strong class="label-bottom">Insatisfeito</strong>
                <span id="countInsatisfeito">0</span>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3>Feedback</h3>
                <div class="chart-wrapper">
                    <canvas id="clienteChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Visitas Realizadas</h3>
                <div class="visitas-box">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <span class="visitas-label">CONCLUÍDAS</span>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="margin-top:0; color: #3b82f6; font-size: 22px;"></h2>
            <div id="modalBody" style="font-size: 16px; color: #cbd5e1; line-height: 1.6;"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

        // === COLOQUE O SEU LINK ABAIXO ===
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = function() {
            if(URL_PLANILHA.includes("COLE_AQUI")) {
                document.getElementById("status").innerText = "Aguardando link do Google Sheets...";
                return;
            }
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (r) => {
                        processar(r.data);
                        document.getElementById("status").innerText = "Dados Sincronizados";
                    }
                });
            });
        };

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem relato.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let dataV = getVal(row, "data") || "N/A";

                if (!cliente) return;

                listasPorCategoria.Total.push(cliente);
                let cor = "#3b82f6";
                
                if (exp.includes("excelente")) { kpi.exc++; cor = "#10b981"; listasPorCategoria.Excelente.push(cliente); }
                else if (exp.includes("bom")) { kpi.bom++; cor = "#3b82f6"; listasPorCategoria.Bom.push(cliente); }
                else if (exp.includes("insat") || exp.includes("ruim")) { kpi.ins++; cor = "#ef4444"; listasPorCategoria.Insatisfeito.push(cliente); }

                if (feedback.length > 5) kpi.visitas++;

                baseDeDados.push({ nome: cliente, data: dataV, texto: feedback, cor: cor });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        data: baseDeDados.map(() => 10),
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 20, // Barras arredondadas
                        barPercentage: 0.4, // Deixa as barras mais finas
                        categoryPercentage: 0.8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false },
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#94a3b8', font: { size: 11 }, maxRotation: 45, minRotation: 45 } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { 
                            backgroundColor: '#08162c',
                            titleColor: '#3b82f6',
                            padding: 12,
                            callbacks: { 
                                title: (items) => baseDeDados[items[0].dataIndex].nome + " | " + baseDeDados[items[0].dataIndex].data,
                                label: (item) => "Nota: " + baseDeDados[item.dataIndex].texto.substring(0, 40) + "..."
                            } 
                        }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            const d = baseDeDados[i];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerHTML = `
                                <div style="margin-bottom:15px; font-size:13px; color:#3b82f6;">DATA DA VISITA: ${d.data}</div>
                                <div>${d.texto}</div>
                            `;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Lista: " + cat;
            let html = "<ul id='modalList'>";
            lista.forEach(n => { html += `<li>${n}</li>`; });
            html += "</ul>";
            document.getElementById("modalBody").innerHTML = html;
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
