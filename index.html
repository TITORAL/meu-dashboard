<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard de Feedback</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b1f3a; color: white; }
        .header { background: #08162c; padding: 25px; font-size: 28px; font-weight: bold; text-align: center; border-bottom: 3px solid #3b82f6; }
        .container { padding: 30px; max-width: 1200px; margin: auto; }
        
        .status-msg { text-align: center; padding: 15px; font-size: 14px; color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-radius: 8px; margin-bottom: 20px; }

        .card { background: #142a52; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); min-height: 600px; display: flex; flex-direction: column; }
        .card h3 { margin: 0 0 20px 0; font-size: 20px; color: #3b82f6; border-left: 4px solid #3b82f6; padding-left: 15px; text-transform: uppercase; }
        
        .chart-wrapper { flex-grow: 1; width: 100%; position: relative; }

        /* Modal de Detalhes */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: #142a52; margin: 10% auto; padding: 30px; border: 1px solid #3b82f6; width: 50%; border-radius: 15px; position: relative; box-shadow: 0 0 30px rgba(59, 130, 246, 0.3); }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 28px; cursor: pointer; color: #ef4444; }
        #modalTitle { color: #3b82f6; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        #modalBody { line-height: 1.6; font-size: 18px; color: #e2e8f0; }
    </style>
</head>

<body>

    <div class="header">RELACIONAMENTO CLIENTE - FEEDBACKS</div>

    <div class="container">
        <div id="status" class="status-msg">Iniciando conexão com a base de dados...</div>

        <div class="card">
            <h3>Feedbacks dos Clientes</h3>
            <p style="font-size: 13px; opacity: 0.6; margin-bottom: 15px;">Passe o mouse para ler o resumo ou clique na barra para ver o feedback completo.</p>
            <div class="chart-wrapper">
                <canvas id="clienteChart"></canvas>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Nome do Cliente</h2>
            <p id="modalBody">Texto do feedback...</p>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];

        // === COLOQUE SEU LINK DO GOOGLE SHEETS ABAIXO ===
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/1gtW_zdsbaJZVoIW46brNXJpdDjigkSbruWiRX2dBMng/edit?usp=sharing"; 

        window.onload = function() {
            if(URL_PLANILHA.includes("COLE_AQUI")) {
                document.getElementById("status").innerText = "ERRO: O link da planilha não foi configurado no código.";
                return;
            }

            fetch(URL_PLANILHA)
                .then(res => {
                    if(!res.ok) throw new Error();
                    return res.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            if(results.data.length > 0) {
                                document.getElementById("status").innerText = "Dados carregados: " + results.data.length + " registros encontrados.";
                                processar(results.data);
                            } else {
                                document.getElementById("status").innerText = "A planilha foi lida, mas não há dados nas linhas.";
                            }
                        }
                    });
                })
                .catch(err => {
                    document.getElementById("status").innerText = "ERRO DE CONEXÃO: Verifique se a planilha foi 'Publicada na Web' como CSV.";
                });
        };

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            baseDeDados = [];

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "N/A";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem feedback registrado.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();

                if (cliente === "N/A" || cliente === "") return;

                // Define a cor baseada na experiência
                let corBarra = "#3b82f6"; // Azul padrão
                if (exp.includes("excelente")) corBarra = "#10b981"; // Verde
                if (exp.includes("insat") || exp.includes("ruim")) corBarra = "#ef4444"; // Vermelho

                baseDeDados.push({
                    nome: cliente,
                    texto: feedback,
                    cor: corBarra
                });
            });

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        label: 'Clientes',
                        data: baseDeDados.map(() => 10), // Barras de tamanho igual
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 5,
                        barThickness: 25
                    }]
                },
                options: {
                    indexAxis: 'y', // Gráfico horizontal para facilitar leitura dos nomes
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { display: false },
                        y: { 
                            ticks: { color: 'white', font: { size: 12 } },
                            grid: { display: false }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => "Feedback: " + baseDeDados[context.dataIndex].texto.substring(0, 50) + "..."
                            }
                        }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            document.getElementById("modalTitle").innerText = baseDeDados[i].nome;
                            document.getElementById("modalBody").innerText = baseDeDados[i].texto;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
