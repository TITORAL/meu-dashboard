<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Vila Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { background: #08162c; padding: 15px; font-weight: bold; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-pc { display: block; font-size: 24px; letter-spacing: 1px; }
        .container { padding: 15px; max-width: 1600px; margin: auto; }
        .status-msg { text-align: center; padding: 5px; font-size: 12px; color: var(--blue); margin-bottom: 10px; opacity: 0.8; }
        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
        .kpi { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 3px solid transparent; cursor: pointer; transition: 0.3s; }
        .kpi:hover { background: #1c3a6e; transform: translateY(-3px); }
        .kpi span { font-size: 28px; font-weight: bold; display: block; }
        .label-bottom { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #94a3b8; }
        .excelente { color: #10b981; border-color: #10b981; }
        .bom { color: var(--blue); border-color: var(--blue); }
        .insatisfeito { color: #ef4444; border-color: #ef4444; }
        .main-content { display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .card h3 { margin: 0 0 15px 0; font-size: 16px; color: var(--blue); text-transform: uppercase; letter-spacing: 1px; }
        .chart-container-scroll { width: 100%; overflow-x: auto; border-radius: 8px; background: rgba(0,0,0,0.1); }
        .chart-wrapper { height: 400px; min-width: 1200px; position: relative; padding: 10px; }
        .visitas-box { padding: 20px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100%; }
        .visitas-num { font-size: 70px; font-weight: bold; color: var(--blue); }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; width: 85%; max-width: 450px; border-radius: 20px; border: 1px solid var(--blue); position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 28px; cursor: pointer; color: #64748b; }
        @media (min-width: 768px) { .kpis { grid-template-columns: repeat(4, 1fr); } .main-content { display: grid; grid-template-columns: 1fr 300px; } }
    </style>
</head>
<body>

    <div class="header">
        <span class="titulo-pc">PERFORMANCE CLIENTE VILA VELHA</span>
    </div>

    <div class="container">
        <div id="status" class="status-msg">Conectando...</div>

        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')">
                <strong class="label-bottom">Total</strong>
                <span id="totalClientes">0</span>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <strong class="label-bottom">Excelente</strong>
                <span id="countExcelente">0</span>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <strong class="label-bottom">Bom</strong>
                <span id="countBom">0</span>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <strong class="label-bottom">Insatisfeito</strong>
                <span id="countInsatisfeito">0</span>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3>Cluster de Performance por Cliente</h3>
                <div class="chart-container-scroll">
                    <div class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>Visitas Realizadas</h3>
                <div class="visitas-box">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div style="font-weight: bold; color: #94a3b8; letter-spacing: 2px;">CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: var(--blue); margin-top: 0;"></h2>
            <div id="modalBody" style="line-height: 1.6; color: #cbd5e1;"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        function formatarDataBR(dataStr) {
            if (!dataStr || dataStr === "N/A") return "Data N/A";
            const data = new Date(dataStr);
            return isNaN(data.getTime()) ? dataStr : data.toLocaleDateString('pt-BR');
        }

        window.onload = function() {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (r) => processar(r.data)
                });
            });
        };

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem relato.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let dataV = formatarDataBR(getVal(row, "data"));

                if (!cliente) return;

                listasPorCategoria.Total.push(cliente);
                let categoria = "Bom";
                let altura = 6;
                
                if (exp.includes("excelente")) { 
                    kpi.exc++; categoria = "Excelente"; altura = 10; 
                    listasPorCategoria.Excelente.push(cliente); 
                }
                else if (exp.includes("bom")) { 
                    kpi.bom++; categoria = "Bom"; altura = 6; 
                    listasPorCategoria.Bom.push(cliente); 
                }
                else if (exp.includes("insat") || exp.includes("ruim")) { 
                    kpi.ins++; categoria = "Insatisfeito"; altura = 3; 
                    listasPorCategoria.Insatisfeito.push(cliente); 
                }

                if (feedback.length > 5) kpi.visitas++;
                baseDeDados.push({ nome: cliente, data: dataV, texto: feedback, categoria: categoria, nivel: altura });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;
            document.getElementById("status").innerText = "Atualizado em tempo real";

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            // Preparação dos dados para Colunas Clusterizadas (lado a lado)
            const labels = baseDeDados.map(d => d.nome);
            
            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Excelente',
                            data: baseDeDados.map(d => d.categoria === 'Excelente' ? d.nivel : 0),
                            backgroundColor: '#10b981',
                            borderRadius: 6,
                            barPercentage: 0.8,
                            categoryPercentage: 0.9,
                            stack: 'stack0' // Define o empilhamento se houver dados no mesmo cliente
                        },
                        {
                            label: 'Bom',
                            data: baseDeDados.map(d => d.categoria === 'Bom' ? d.nivel : 0),
                            backgroundColor: '#3b82f6',
                            borderRadius: 6,
                            barPercentage: 0.8,
                            categoryPercentage: 0.9,
                            stack: 'stack0'
                        },
                        {
                            label: 'Insatisfeito',
                            data: baseDeDados.map(d => d.categoria === 'Insatisfeito' ? d.nivel : 0),
                            backgroundColor: '#ef4444',
                            borderRadius: 6,
                            barPercentage: 0.8,
                            categoryPercentage: 0.9,
                            stack: 'stack0'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            display: true, 
                            min: 0, max: 12,
                            grid: { color: 'rgba(255, 255, 255, 0.05)' },
                            ticks: { display: false }
                        },
                        x: { 
                            grid: { display: false },
                            ticks: { 
                                color: '#94a3b8', 
                                font: { size: 9 },
                                autoSkip: false,
                                maxRotation: 45,
                                minRotation: 45
                            } 
                        }
                    },
                    plugins: { 
                        legend: { 
                            display: true, 
                            position: 'top',
                            labels: { color: '#f8fafc', font: { size: 12 }, usePointStyle: true }
                        },
                        tooltip: {
                            callbacks: {
                                title: (items) => baseDeDados[items[0].dataIndex].nome,
                                label: (item) => `Status: ${item.dataset.label} | Data: ${baseDeDados[item.dataIndex].data}`
                            }
                        }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            const d = baseDeDados[i];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerHTML = `
                                <div style="color: #3b82f6; font-size: 13px; margin-bottom: 10px; font-weight: bold;">DETALHES DA PERFORMANCE: ${d.categoria.toUpperCase()}</div>
                                <div style="color: #94a3b8; font-size: 12px; margin-bottom: 10px;">DATA DA ÚLTIMA VISITA: ${d.data}</div>
                                <p style="border-top: 1px solid #1e3a8a; padding-top: 15px;">${d.texto}</p>
                            `;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Lista: " + cat;
            document.getElementById("modalBody").innerHTML = lista.length > 0 ? "• " + lista.join("<br>• ") : "Nenhum cliente nesta categoria.";
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
