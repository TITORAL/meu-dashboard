<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERFORMANCE CLIENTE VILA VELHA</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { background: #08162c; padding: 12px; text-align: center; border-bottom: 3px solid var(--blue); position: sticky; top: 0; z-index: 100; }
        .titulo-header { font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 10px; max-width: 1600px; margin: auto; }

        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .kpi { background: var(--card); padding: 12px 5px; border-radius: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-bottom: 3px solid transparent; cursor: pointer; }
        .kpi span { font-size: 26px; font-weight: bold; display: block; }
        .label-bottom { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #94a3b8; margin-top: 4px; display: block; }

        .total { border-color: #fff; }
        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }
        .cancelado { border-color: #64748b; color: #94a3b8; }

        .main-content { display: flex; flex-direction: column; gap: 12px; }
        .card-feedback { background: var(--card); padding: 15px; border-radius: 12px; display: flex; flex-direction: column; min-height: 420px; }
        
        .chart-container { width: 100%; flex-grow: 1; min-height: 350px; overflow-x: auto; overflow-y: hidden; }
        .chart-wrapper { height: 100%; min-width: 2500px; position: relative; padding-bottom: 20px; } 

        .visitas-card { background: var(--card); padding: 20px; border-radius: 12px; text-align: center; border-left: 4px solid var(--blue); }
        .visitas-num { font-size: 50px; font-weight: bold; color: var(--blue); display: block; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); margin: 2% auto; padding: 20px; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 15px; border: 1px solid var(--blue); position: relative; overflow-y: auto; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; color: #64748b; }
        
        .cliente-item-detalhe { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--blue); line-height: 1.5; }
        .cliente-item-detalhe strong { color: var(--blue); font-size: 16px; display: block; margin-bottom: 5px; }
        .info-grid { font-size: 13px; color: #cbd5e1; }

        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(5, 1fr); gap: 12px; }
            .main-content { display: grid; grid-template-columns: 1fr 280px; }
            .chart-wrapper { min-width: 100%; } 
        }
    </style>
</head>
<body>
    <div class="header"><span class="titulo-header">PERFORMANCE CLIENTE VILA VELHA</span></div>
    
    <div class="container">
        <div class="kpis">
            <div class="kpi total" onclick="showCategory('Todos')"><span id="totalClientes">0</span><strong class="label-bottom">Clientes</strong></div>
            <div class="kpi excelente" onclick="showCategory('Excelente')"><span id="countExcelente">0</span><strong class="label-bottom">Excelente</strong></div>
            <div class="kpi bom" onclick="showCategory('Bom')"><span id="countBom">0</span><strong class="label-bottom">Bom</strong></div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')"><span id="countInsatisfeito">0</span><strong class="label-bottom">Insatisfeito</strong></div>
            <div class="kpi cancelado" onclick="showCategory('Cancelado')"><span id="countCancelado">0</span><strong class="label-bottom">Cancelados</strong></div>
        </div>

        <div class="main-content">
            <div class="card card-feedback">
                <div class="chart-container">
                    <div class="chart-wrapper" id="graficoScroll"><canvas id="clienteChart"></canvas></div>
                </div>
            </div>
            <div class="visitas-card">
                <strong style="font-size: 10px; color: #94a3b8; text-transform: uppercase;">Visitas Concluídas</strong>
                <span id="totalVisitas" class="visitas-num">0</span>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color:var(--blue); font-size:18px; border-bottom:1px solid #333; padding-bottom:10px; margin-bottom:15px;"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLMRik-fVqpkumGCnTayN7EuWM7naaE_yCV2RFuyvuJwKli5XdBUDCq6-vu5xcPXZ5g0qLqSWU3ZGX/pub?output=csv"; 

        window.onload = () => {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { 
                    header: true, 
                    skipEmptyLines: true,
                    transformHeader: (h) => h.trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""),
                    complete: (r) => processar(r.data) 
                });
            });
        };

        function processar(dados) {
            baseDeDados = [];
            listasPorCategoria = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };
            let visitasCount = 0;

            dados.forEach(row => {
                let fantasia = row["Fantasia"];
                if (!fantasia || fantasia.toLowerCase().includes("total")) return;

                let exp = (row["Experiencia"] || "").toLowerCase();
                let feedback = row["Feedback"] || "Sem feedback registrado.";

                let info = {
                    fantasia: fantasia,
                    nomeCliente: row["Nome do cliente"] || "---",
                    endereco: row["Endereco"] || "---",
                    numero: row["Numero"] || "---",
                    bairro: row["Bairro"] || "---",
                    celular: row["Celular"] || "---",
                    cpf: row["CPF"] || "---",
                    feedback: feedback,
                    experiencia: exp,
                    data: row["Data"] || "---"
                };

                // Contabiliza visitas concluídas (todas as linhas válidas)
                visitasCount++;

                let cor = "#3b82f6"; let valor = 7;

                // Lógica de Categorização por Experiência
                if (exp.includes("excelente")) { 
                    cor = "#10b981"; valor = 10; listasPorCategoria.Excelente.push(info); 
                } else if (exp.includes("insat") || exp.includes("ruim")) { 
                    cor = "#ef4444"; valor = 4; listasPorCategoria.Insatisfeito.push(info); 
                } else if (exp.includes("cancel")) { 
                    cor = "#64748b"; valor = 2; listasPorCategoria.Cancelado.push(info); 
                } else { 
                    // Considera "Bom" como padrão se não for as outras
                    listasPorCategoria.Bom.push(info); 
                }

                listasPorCategoria.Todos.push(info);
                baseDeDados.push({ ...info, cor, valor });
            });

            document.getElementById("totalClientes").innerText = listasPorCategoria.Todos.length;
            document.getElementById("countExcelente").innerText = listasPorCategoria.Excelente.length;
            document.getElementById("countBom").innerText = listasPorCategoria.Bom.length;
            document.getElementById("countInsatisfeito").innerText = listasPorCategoria.Insatisfeito.length;
            document.getElementById("countCancelado").innerText = listasPorCategoria.Cancelado.length;
            document.getElementById("totalVisitas").innerText = visitasCount;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();
            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.fantasia),
                    datasets: [{ data: baseDeDados.map(d => d.valor), backgroundColor: baseDeDados.map(d => d.cor), borderRadius: 2 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { 
                        y: { display: false, max: 12 }, 
                        x: { ticks: { color: '#94a3b8', font: { size: 8 }, maxRotation: 90, autoSkip: false } } 
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = baseDeDados[el[0].index];
                            showDetails(d);
                        }
                    }
                }
            });
        }

        function showDetails(d) {
            openModal(d.fantasia, `
                <div class="info-grid">
                    <p><b>Nome do Cliente:</b> ${d.nomeCliente}</p>
                    <p><b>Endereço:</b> ${d.endereco}, ${d.numero}</p>
                    <p><b>Bairro:</b> ${d.bairro}</p>
                    <p><b>Celular:</b> ${d.celular} | <b>CPF:</b> ${d.cpf}</p>
                    <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
                    <p><b>Data:</b> ${d.data}</p>
                    <p><b>Feedback:</b> ${d.feedback}</p>
                    <p><b>Experiência:</b> ${d.experiencia.toUpperCase()}</p>
                </div>
            `);
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            let html = "";
            lista.forEach(i => {
                html += `
                    <div class="cliente-item-detalhe">
                        <strong>${i.fantasia}</strong>
                        <div class="info-grid">
                            <span><b>Nome:</b> ${i.nomeCliente}</span><br>
                            <span><b>Endereço:</b> ${i.endereco}, ${i.numero} - ${i.bairro}</span><br>
                            <span><b>Celular:</b> ${i.celular}</span> | <span><b>CPF:</b> ${i.cpf}</span><br>
                            <span><b>Exp:</b> ${i.experiencia.toUpperCase()}</span>
                        </div>
                    </div>`;
            });
            openModal("Lista: " + cat, html || "<p style='text-align:center'>Nenhum registro encontrado.</p>");
        }

        function openModal(titulo, conteudo) {
            document.getElementById("modalTitle").innerText = titulo;
            document.getElementById("modalBody").innerHTML = conteudo;
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
    </script>
</body>
</html>
