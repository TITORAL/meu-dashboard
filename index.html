<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PERFORMANCE CLIENTE - 83 REGISTROS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { background: #08162c; padding: 15px; text-align: center; border-bottom: 3px solid var(--blue); font-weight: bold; letter-spacing: 1px; }
        .container { padding: 10px; max-width: 1600px; margin: auto; }

        .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .kpi { background: var(--card); padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; border-bottom: 4px solid transparent; transition: 0.2s; }
        .kpi span { font-size: 30px; font-weight: bold; display: block; }
        .kpi strong { font-size: 11px; color: #94a3b8; text-transform: uppercase; }

        .total { border-color: #fff; }
        .excelente { border-color: #10b981; color: #10b981; }
        .bom { border-color: var(--blue); color: var(--blue); }
        .insatisfeito { border-color: #ef4444; color: #ef4444; }
        .cancelado { border-color: #64748b; color: #94a3b8; }

        .main-content { display: flex; flex-direction: column; gap: 15px; }
        .card-chart { background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* Container com scroll para os 83 clientes */
        .chart-container { width: 100%; height: 400px; overflow-x: auto; overflow-y: hidden; cursor: grab; }
        .chart-wrapper { height: 100%; position: relative; } 

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 25px; width: 85%; max-width: 700px; max-height: 80vh; border-radius: 15px; border: 1px solid var(--blue); overflow-y: auto; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 15px; font-size: 30px; cursor: pointer; color: #fff; }
        
        .item-lista { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid var(--blue); }

        @media (min-width: 768px) {
            .kpis { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

    <div class="header">PERFORMANCE VILA VELHA - <span id="labelTotal">83</span> CLIENTES</div>

    <div class="container">
        <div class="kpis">
            <div class="kpi total" onclick="abrirCategoria('Todos')"><span id="t_total">0</span><strong>Clientes</strong></div>
            <div class="kpi excelente" onclick="abrirCategoria('Excelente')"><span id="t_exc">0</span><strong>Excelente</strong></div>
            <div class="kpi bom" onclick="abrirCategoria('Bom')"><span id="t_bom">0</span><strong>Bom</strong></div>
            <div class="kpi insatisfeito" onclick="abrirCategoria('Insatisfeito')"><span id="t_ins">0</span><strong>Insatisfeito</strong></div>
            <div class="kpi cancelado" onclick="abrirCategoria('Cancelado')"><span id="t_can">0</span><strong>Cancelados</strong></div>
        </div>

        <div class="main-content">
            <div class="card-chart">
                <div class="chart-container" id="scrollContainer">
                    <div class="chart-wrapper" id="canvasWrapper">
                        <canvas id="meuGrafico"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModal()">&times;</span>
            <h2 id="modalTitulo" style="color: var(--blue); margin-top: 0;"></h2>
            <div id="modalCorpo"></div>
        </div>
    </div>

    <script>
        let chartInstance;
        let dadosClientes = [];
        let grupos = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

        const URL_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv";

        window.onload = () => {
            fetch(URL_CSV).then(res => res.text()).then(csv => {
                Papa.parse(csv, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (res) => processarDados(res.data)
                });
            });
        };

        function processarDados(dados) {
            dadosClientes = [];
            grupos = { Todos: [], Excelente: [], Bom: [], Insatisfeito: [], Cancelado: [] };

            dados.forEach(linha => {
                // Mapeamento direto das colunas da sua planilha Git
                let nome = linha["Fantasia"] || linha["Nome do cliente"];
                if (!nome || nome.toLowerCase().includes("total")) return;

                let exp = (linha["Experiência "] || linha["Experiência"] || "").toLowerCase();
                let feedback = linha["Feedback "] || linha["Feedback"] || "Sem feedback registrado.";
                let bairro = linha["Bairro"] || "---";

                let cor = "#3b82f6"; let valor = 7;

                if (exp.includes("excelente")) { 
                    cor = "#10b981"; valor = 10; grupos.Excelente.push({nome, feedback, bairro}); 
                } else if (exp.includes("insat") || exp.includes("ruim")) { 
                    cor = "#ef4444"; valor = 4; grupos.Insatisfeito.push({nome, feedback, bairro}); 
                } else if (exp.includes("cancel")) { 
                    cor = "#64748b"; valor = 2; grupos.Cancelado.push({nome, feedback, bairro}); 
                } else { 
                    grupos.Bom.push({nome, feedback, bairro}); 
                }

                grupos.Todos.push({nome, feedback, bairro});
                dadosClientes.push({ nome, cor, valor, feedback });
            });

            // Atualiza KPIs
            document.getElementById("t_total").innerText = grupos.Todos.length;
            document.getElementById("t_exc").innerText = grupos.Excelente.length;
            document.getElementById("t_bom").innerText = grupos.Bom.length;
            document.getElementById("t_ins").innerText = grupos.Insatisfeito.length;
            document.getElementById("t_can").innerText = grupos.Cancelado.length;
            document.getElementById("labelTotal").innerText = grupos.Todos.length;

            // Ajusta largura do gráfico para caber todos os 83
            const larguraNecessaria = dadosClientes.length * 50; 
            document.getElementById("canvasWrapper").style.minWidth = larguraNecessaria + "px";

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            if (chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dadosClientes.map(d => d.nome),
                    datasets: [{
                        data: dadosClientes.map(d => d.valor),
                        backgroundColor: dadosClientes.map(d => d.cor),
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false, max: 12 },
                        x: { ticks: { color: '#94a3b8', font: { size: 10 }, maxRotation: 90, autoSkip: false } }
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = dadosClientes[el[0].index];
                            abrirModal(d.nome, `<p style='font-size:16px; line-height:1.6;'>${d.feedback}</p>`);
                        }
                    }
                }
            });
        }

        function abrirCategoria(cat) {
            const lista = grupos[cat];
            let html = "";
            lista.forEach(c => {
                html += `<div class="item-lista"><strong>${c.nome}</strong><br><small>Bairro: ${c.bairro}</small><p style="margin-top:8px; font-size:13px; color:#cbd5e1;">${c.feedback}</p></div>`;
            });
            abrirModal("Lista: " + cat, html);
        }

        function abrirModal(titulo, conteudo) {
            document.getElementById("modalTitulo").innerText = titulo;
            document.getElementById("modalCorpo").innerHTML = conteudo;
            document.getElementById("modal").style.display = "block";
        }

        function fecharModal() { document.getElementById("modal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') fecharModal(); }
    </script>
</body>
</html>
