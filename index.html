<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Vila Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { --bg: #0b1f3a; --card: #142a52; --blue: #3b82f6; --text: #f8fafc; }
        
        /* Força o layout a caber na tela sem rolar para baixo */
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }
        
        .header { background: #08162c; padding: 8px; text-align: center; border-bottom: 2px solid var(--blue); flex-shrink: 0; }
        .titulo-pc { font-size: 16px; font-weight: bold; letter-spacing: 1px; }

        .container { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; box-sizing: border-box; justify-content: flex-start; }
        
        /* KPIs em linha única e compactos */
        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; flex-shrink: 0; }
        .kpi { background: var(--card); padding: 6px; border-radius: 8px; text-align: center; border-bottom: 2px solid transparent; }
        .kpi span { font-size: 16px; font-weight: bold; display: block; }
        .label-bottom { font-size: 7px; font-weight: bold; text-transform: uppercase; color: #94a3b8; }
        
        .excelente { color: #10b981; border-color: #10b981; }
        .bom { color: var(--blue); border-color: var(--blue); }
        .insatisfeito { color: #ef4444; border-color: #ef4444; }

        .main-content { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow: hidden; }
        
        /* Card do Gráfico Centralizado e Menor */
        .card { background: var(--card); padding: 10px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card h3 { margin: 0 0 8px 0; font-size: 10px; color: var(--blue); text-transform: uppercase; text-align: center; width: 100%; }
        
        .chart-container-scroll { width: 100%; overflow-x: auto; display: flex; justify-content: center; }
        .chart-wrapper { height: 160px; min-width: 100%; position: relative; margin: 0 auto; }

        /* Card de Visitas Compacto para subir na tela */
        .visitas-box { text-align: center; padding: 5px 0; }
        .visitas-num { font-size: 36px; font-weight: bold; color: var(--blue); line-height: 1; }
        .visitas-label { font-weight: bold; color: #94a3b8; font-size: 9px; margin-top: 2px; }

        @media (min-width: 992px) { 
            .main-content { display: grid; grid-template-columns: 7fr 3fr; align-items: center; } 
            .chart-wrapper { height: 250px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="titulo-pc">PERFORMANCE VILA VELHA</span>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')"><strong class="label-bottom">Total</strong><span id="totalClientes">0</span></div>
            <div class="kpi excelente" onclick="showCategory('Excelente')"><strong class="label-bottom">Exc</strong><span id="countExcelente">0</span></div>
            <div class="kpi bom" onclick="showCategory('Bom')"><strong class="label-bottom">Bom</strong><span id="countBom">0</span></div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')"><strong class="label-bottom">Ins</strong><span id="countInsatisfeito">0</span></div>
        </div>

        <div class="main-content">
            <div class="card">
                <h3>FEEDBACK POR CLIENTE</h3>
                <div class="chart-container-scroll">
                    <div class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3>VISITAS</h3>
                <div class="visitas-box">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div class="visitas-label">CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let chartRef;
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = () => {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { header: true, skipEmptyLines: true, complete: (r) => processar(r.data) });
            });
        };

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            let baseDeDados = [];

            dados.forEach(row => {
                let cliente = row.fantasia || row.cliente || "";
                let feedback = row.feedback || row.relato || "";
                let exp = String(row.experiência || row.status || "").toLowerCase();
                if (!cliente) return;

                let cat = "Bom", valor = 6;
                if (exp.includes("excelente")) { kpi.exc++; cat = "Excelente"; valor = 10; }
                else if (exp.includes("bom")) { kpi.bom++; cat = "Bom"; valor = 6; }
                else if (exp.includes("insat")) { kpi.ins++; cat = "Insatisfeito"; valor = 3; }

                if (feedback.length > 5) kpi.visitas++;
                baseDeDados.push({ nome: cliente, categoria: cat, valor: valor });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico(baseDeDados);
        }

        function renderizarGrafico(dados) {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            const wrapper = document.querySelector('.chart-wrapper');
            // Largura controlada: Se houver poucos clientes, centraliza. Se houver muitos, permite scroll.
            const larguraCalculada = dados.length * 45; 
            wrapper.style.width = larguraCalculada < wrapper.parentElement.offsetWidth ? "100%" : larguraCalculada + "px";

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dados.map(d => d.nome),
                    datasets: [
                        { label: 'Exc', data: dados.map(d => d.categoria === 'Excelente' ? d.valor : 0), backgroundColor: '#10b981', borderRadius: 4, barPercentage: 0.5 },
                        { label: 'Bom', data: dados.map(d => d.categoria === 'Bom' ? d.valor : 0), backgroundColor: '#3b82f6', borderRadius: 4, barPercentage: 0.5 },
                        { label: 'Ins', data: dados.map(d => d.categoria === 'Insatisfeito' ? d.valor : 0), backgroundColor: '#ef4444', borderRadius: 4, barPercentage: 0.5 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { stacked: true, display: false, max: 12 },
                        x: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 8 }, maxRotation: 45 } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }
    </script>
</body>
</html>
