<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Vila Velha</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        :root { 
            --bg: #0b1f3a; 
            --card: #142a52; 
            --blue: #3b82f6; 
            --text: #f8fafc;
            --exc: #10b981;
            --ins: #ef4444;
        }

        /* Impede rolagem lateral e vertical no corpo para caber tudo na tela */
        body { 
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            overflow: hidden; height: 100vh; display: flex; flex-direction: column; 
        }

        .header { 
            background: #08162c; padding: 10px; text-align: center; 
            border-bottom: 2px solid var(--blue); flex-shrink: 0; 
        }
        .titulo-pc { font-size: 16px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }

        .container { 
            padding: 10px; flex-grow: 1; display: flex; 
            flex-direction: column; gap: 10px; box-sizing: border-box; 
        }

        /* KPIs compactos para Mobile */
        .kpis { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 8px; flex-shrink: 0; 
        }
        .kpi { 
            background: var(--card); padding: 12px; border-radius: 10px; 
            text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border-bottom: 3px solid transparent;
        }
        .kpi span { font-size: 20px; font-weight: bold; display: block; }
        .label-bottom { font-size: 9px; text-transform: uppercase; color: #94a3b8; font-weight: bold; }
        
        .kpi.excelente { border-color: var(--exc); color: var(--exc); }
        .kpi.bom { border-color: var(--blue); color: var(--blue); }
        .kpi.insatisfeito { border-color: var(--ins); color: var(--ins); }

        /* Área de conteúdo principal */
        .main-content { 
            display: flex; flex-direction: column; gap: 10px; 
            flex-grow: 1; overflow: hidden; 
        }

        .card { 
            background: var(--card); padding: 12px; border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: flex; 
            flex-direction: column; justify-content: center;
        }
        .card h3 { margin: 0 0 8px 0; font-size: 11px; color: var(--blue); text-transform: uppercase; }

        /* Gráfico Reduzido para Mobile */
        .chart-container-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .chart-wrapper { height: 180px; min-width: 600px; position: relative; }

        /* Visitas Compactas */
        .visitas-box { text-align: center; }
        .visitas-num { font-size: 42px; font-weight: bold; color: var(--blue); line-height: 1; }
        .visitas-label { font-size: 10px; color: #94a3b8; font-weight: bold; margin-top: 4px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); margin: 20% auto; padding: 20px; width: 85%; border-radius: 15px; border: 1px solid var(--blue); }

        /* Ajustes para Desktop */
        @media (min-width: 992px) { 
            .kpis { grid-template-columns: repeat(4, 1fr); } 
            .main-content { display: grid; grid-template-columns: 2fr 1fr; }
            .chart-wrapper { height: 300px; }
            .titulo-pc { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <span class="titulo-pc">Performance Vila Velha</span>
    </div>

    <div class="container">
        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')">
                <span id="totalClientes">0</span><strong class="label-bottom">Total Clientes</strong>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <span id="countExcelente">0</span><strong class="label-bottom">Excelente</strong>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <span id="countBom">0</span><strong class="label-bottom">Bom</strong>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <span id="countInsatisfeito">0</span><strong class="label-bottom">Atenção</strong>
            </div>
        </div>

        <div class="main-content">
            <div class="card" style="flex: 2;">
                <h3>Status por Unidade</h3>
                <div class="chart-container-scroll">
                    <div class="chart-wrapper">
                        <canvas id="clienteChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="card" style="flex: 1;">
                <div class="visitas-box">
                    <span id="totalVisitas" class="visitas-num">0</span>
                    <div class="visitas-label">VISITAS CONCLUÍDAS</div>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="color: var(--blue); font-size: 18px; margin: 0 0 10px 0;"></h2>
            <div id="modalBody" style="font-size: 14px; color: #cbd5e1; line-height: 1.5;"></div>
            <button onclick="closeModal()" style="margin-top: 15px; width: 100%; padding: 10px; background: var(--blue); color: #fff; border: none; border-radius: 8px;">Fechar</button>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv";

        window.onload = () => {
            fetch(URL_PLANILHA).then(res => res.text()).then(csv => {
                Papa.parse(csv, { header: true, skipEmptyLines: true, complete: (r) => processar(r.data) });
            });
        };

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                const k = Object.keys(row);
                let cliente = row[k.find(x => x.toLowerCase().includes('fantasia'))] || row[k.find(x => x.toLowerCase().includes('cliente'))];
                let exp = String(row[k.find(x => x.toLowerCase().includes('experiência'))] || "").toLowerCase();
                let relato = row[k.find(x => x.toLowerCase().includes('feedback'))] || "Sem relato";
                
                if(!cliente) return;

                let status = "Bom";
                if(exp.includes("excelente")) { status = "Excelente"; kpi.exc++; }
                else if(exp.includes("insat") || exp.includes("ruim")) { status = "Insatisfeito"; kpi.ins++; }
                else { kpi.bom++; }

                if(relato.length > 5) kpi.visitas++;
                
                listasPorCategoria[status].push(cliente);
                listasPorCategoria.Total.push(cliente);
                baseDeDados.push({ nome: cliente, status: status, relato: relato });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        data: baseDeDados.map(() => 10),
                        backgroundColor: baseDeDados.map(d => {
                            if(d.status === 'Excelente') return '#10b981';
                            if(d.status === 'Insatisfeito') return '#ef4444';
                            return '#3b82f6';
                        }),
                        borderRadius: 5,
                        barPercentage: 0.5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false, max: 12 },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 9 }, maxRotation: 45 } }
                    },
                    plugins: { legend: { display: false } },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const d = baseDeDados[el[0].index];
                            document.getElementById("modalTitle").innerText = d.nome;
                            document.getElementById("modalBody").innerText = d.relato;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Filtro: " + cat;
            document.getElementById("modalBody").innerHTML = "• " + lista.join("<br>• ");
            document.getElementById("feedbackModal").style.display = "block";
        }
        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
    </script>
</body>
</html>
