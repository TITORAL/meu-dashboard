<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Performance - Relacionamento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b1f3a; color: white; }
        .header { background: #08162c; padding: 25px; font-size: 28px; font-weight: bold; text-align: center; border-bottom: 3px solid #3b82f6; }
        .container { padding: 30px; max-width: 1600px; margin: auto; }
        .status-msg { text-align: center; padding: 10px; font-size: 14px; color: #3b82f6; }

        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi { 
            background: #142a52; padding: 20px; border-radius: 15px; text-align: center; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.3); border-bottom: 4px solid transparent; 
            cursor: pointer; transition: transform 0.2s;
        }
        .kpi:hover { transform: scale(1.02); background: #1c3a6e; }
        .kpi span { font-size: 38px; font-weight: bold; display: block; }
        .label-bottom { font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }

        .excelente { color: #10b981; border-color: #10b981; }
        .bom { color: #3b82f6; border-color: #3b82f6; }
        .insatisfeito { color: #ef4444; border-color: #ef4444; }

        .card { background: #142a52; padding: 25px; border-radius: 15px; min-height: 550px; display: flex; flex-direction: column; }
        .card h3 { margin: 0 0 20px 0; font-size: 18px; color: #3b82f6; border-left: 4px solid #3b82f6; padding-left: 15px; }
        
        .chart-wrapper { flex-grow: 1; width: 100%; position: relative; min-height: 450px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: #142a52; margin: 8% auto; padding: 30px; border: 1px solid #3b82f6; width: 40%; border-radius: 15px; position: relative; max-height: 70vh; overflow-y: auto; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 24px; cursor: pointer; color: #ef4444; }
        
        #modalList { list-style: none; padding: 0; margin-top: 15px; }
        #modalList li { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>

<body>

    <div class="header">RELACIONAMENTO CLIENTE - PERFORMANCE</div>

    <div class="container">
        <div id="status" class="status-msg">A carregar dados do Google Sheets...</div>

        <div class="kpis">
            <div class="kpi" onclick="showCategory('Total')">
                <strong class="label-bottom">TOTAL DE CLIENTES</strong>
                <span id="totalClientes">0</span>
            </div>
            <div class="kpi excelente" onclick="showCategory('Excelente')">
                <strong class="label-bottom">EXCELENTE</strong>
                <span id="countExcelente">0</span>
            </div>
            <div class="kpi bom" onclick="showCategory('Bom')">
                <strong class="label-bottom">BOM</strong>
                <span id="countBom">0</span>
            </div>
            <div class="kpi insatisfeito" onclick="showCategory('Insatisfeito')">
                <strong class="label-bottom">INSATISFEITO</strong>
                <span id="countInsatisfeito">0</span>
            </div>
        </div>

        <div class="card">
            <h3>Feedback</h3>
            <div class="chart-wrapper">
                <canvas id="clienteChart"></canvas>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: #3b82f6;"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];
        let listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

        // === COLOQUE O SEU LINK ABAIXO ===
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = function() {
            if(URL_PLANILHA.includes("COLE_AQUI")) {
                document.getElementById("status").innerText = "ERRO: Link não configurado.";
                return;
            }

            fetch(URL_PLANILHA)
                .then(res => res.text())
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            processar(results.data);
                            document.getElementById("status").innerText = "Sincronizado com Sucesso";
                        }
                    });
                });
        };

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0 };
            baseDeDados = [];
            listasPorCategoria = { Excelente: [], Bom: [], Insatisfeito: [], Total: [] };

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "N/A";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem feedback.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();
                let dataVisita = getVal(row, "data") || ""; // Pega a coluna de data

                if (cliente === "N/A") return;

                listasPorCategoria.Total.push(cliente);

                let corBarra = "#3b82f6";
                if (exp.includes("excelente")) {
                    kpi.exc++; corBarra = "#10b981";
                    listasPorCategoria.Excelente.push(cliente);
                } else if (exp.includes("bom")) {
                    kpi.bom++; corBarra = "#3b82f6";
                    listasPorCategoria.Bom.push(cliente);
                } else if (exp.includes("insat") || exp.includes("ruim")) {
                    kpi.ins++; corBarra = "#ef4444";
                    listasPorCategoria.Insatisfeito.push(cliente);
                }

                baseDeDados.push({
                    nome: cliente,
                    data: dataVisita,
                    texto: feedback,
                    cor: corBarra
                });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    // Aqui combinamos Nome + Espaços + Data para a etiqueta do gráfico
                    labels: baseDeDados.map(d => d.nome), 
                    datasets: [{
                        data: baseDeDados.map(() => 10),
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false },
                        x: { 
                            ticks: { 
                                color: 'white', 
                                font: { size: 10 },
                                maxRotation: 90, 
                                minRotation: 90,
                                // ESTA FUNÇÃO ADICIONA A DATA AO LADO DO NOME
                                callback: function(value, index) {
                                    let item = baseDeDados[index];
                                    return item.nome + "      (" + item.data + ")";
                                }
                            } 
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { 
                            callbacks: { 
                                label: (item) => "Feedback: " + baseDeDados[item.dataIndex].texto 
                            } 
                        }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            document.getElementById("modalTitle").innerText = baseDeDados[i].nome + " - " + baseDeDados[i].data;
                            document.getElementById("modalBody").innerHTML = `<p>${baseDeDados[i].texto}</p>`;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function showCategory(cat) {
            const lista = listasPorCategoria[cat];
            document.getElementById("modalTitle").innerText = "Clientes: " + cat;
            let html = "<ul id='modalList'>";
            lista.forEach(nome => { html += `<li>${nome}</li>`; });
            html += "</ul>";
            document.getElementById("modalBody").innerHTML = html;
            document.getElementById("feedbackModal").style.display = "block";
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
