<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Performance - Relacionamento</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b1f3a; color: white; }
        .header { background: #08162c; padding: 25px; font-size: 28px; font-weight: bold; text-align: center; border-bottom: 3px solid #3b82f6; }
        .container { padding: 30px; max-width: 1600px; margin: auto; }
        
        .status-msg { text-align: center; padding: 10px; font-size: 14px; color: #3b82f6; }

        .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .kpi { background: #142a52; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 8px 16px rgba(0,0,0,0.3); border-bottom: 4px solid transparent; }
        .kpi span { font-size: 38px; font-weight: bold; display: block; }
        .label-bottom { font-size: 14px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: block; }

        .excelente { color: #10b981; border-color: #10b981; }
        .bom { color: #3b82f6; border-color: #3b82f6; }
        .insatisfeito { color: #ef4444; border-color: #ef4444; }

        .charts-container { display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 25px; }
        .card { background: #142a52; padding: 25px; border-radius: 15px; min-height: 500px; display: flex; flex-direction: column; }
        .card h3 { margin: 0 0 20px 0; font-size: 18px; color: #3b82f6; border-left: 4px solid #3b82f6; padding-left: 15px; }
        
        .chart-wrapper { flex-grow: 1; width: 100%; position: relative; min-height: 400px; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); }
        .modal-content { background: #142a52; margin: 10% auto; padding: 30px; border: 1px solid #3b82f6; width: 40%; border-radius: 15px; position: relative; }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 24px; cursor: pointer; color: #ef4444; }

        .big-num-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; flex-grow: 1; }
        .big-num { font-size: 100px; font-weight: bold; color: #10b981; }
    </style>
</head>

<body>

    <div class="header">RELACIONAMENTO CLIENTE - PERFORMANCE</div>

    <div class="container">
        <div id="status" class="status-msg">A carregar dados do Google Sheets...</div>

        <div class="kpis">
            <div class="kpi">
                <strong class="label-bottom">TOTAL DE CLIENTES</strong>
                <span id="totalClientes">0</span>
            </div>
            <div class="kpi excelente">
                <strong class="label-bottom">EXCELENTE</strong>
                <span id="countExcelente">0</span>
            </div>
            <div class="kpi bom">
                <strong class="label-bottom">BOM</strong>
                <span id="countBom">0</span>
            </div>
            <div class="kpi insatisfeito">
                <strong class="label-bottom">INSATISFEITO</strong>
                <span id="countInsatisfeito">0</span>
            </div>
        </div>

        <div class="charts-container">
            <div class="card">
                <h3>Feedback</h3>
                <div class="chart-wrapper">
                    <canvas id="clienteChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h3>Visitas Realizadas</h3>
                <div class="big-num-box">
                    <span id="totalVisitas" class="big-num">0</span>
                    <span style="opacity: 0.6; font-weight: bold; letter-spacing: 2px;">CONCLUÍDAS</span>
                </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle" style="color: #3b82f6;"></h2>
            <p id="modalBody"></p>
        </div>
    </div>

    <script>
        let chartRef;
        let baseDeDados = [];

        // === COLOQUE O SEU LINK ABAIXO ===
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXkZKTd9HAXueZgAFruapogaLr7t5418U7JhDoSG60attaTbbKqIN5oahDXieJHjMgnnl4T_f4i_wV/pub?output=csv"; 

        window.onload = function() {
            if(URL_PLANILHA.includes("COLE_AQUI")) {
                document.getElementById("status").innerText = "ERRO: Falta colar o link do Google Sheets no código.";
                return;
            }

            fetch(URL_PLANILHA)
                .then(res => {
                    if(!res.ok) throw new Error("Erro ao aceder à planilha");
                    return res.text();
                })
                .then(csvText => {
                    Papa.parse(csvText, {
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            if(results.data.length > 0) {
                                document.getElementById("status").innerText = "Dados atualizados com sucesso!";
                                processar(results.data);
                            } else {
                                document.getElementById("status").innerText = "Planilha lida, mas parece estar vazia.";
                            }
                        }
                    });
                })
                .catch(err => {
                    document.getElementById("status").innerText = "Erro na ligação: Verifique se publicou a planilha como CSV.";
                    console.error(err);
                });
        };

        function getVal(obj, termo) {
            const key = Object.keys(obj).find(k => k.toLowerCase().includes(termo.toLowerCase()));
            return key ? obj[key] : "";
        }

        function processar(dados) {
            let kpi = { exc: 0, bom: 0, ins: 0, visitas: 0 };
            baseDeDados = [];

            dados.forEach(row => {
                let cliente = getVal(row, "fantasia") || getVal(row, "cliente") || "N/A";
                let feedback = getVal(row, "feedback") || getVal(row, "relato") || "Sem feedback.";
                let exp = String(getVal(row, "experiência") || getVal(row, "status") || "").toLowerCase();

                if (cliente === "N/A") return;

                if (exp.includes("excelente")) kpi.exc++;
                else if (exp.includes("bom")) kpi.bom++;
                else if (exp.includes("insat") || exp.includes("ruim")) kpi.ins++;

                if (feedback.length > 5 || exp !== "") kpi.visitas++;

                baseDeDados.push({
                    nome: cliente,
                    texto: feedback,
                    cor: exp.includes("excelente") ? "#10b981" : (exp.includes("bom") ? "#3b82f6" : "#ef4444")
                });
            });

            document.getElementById("totalClientes").innerText = baseDeDados.length;
            document.getElementById("countExcelente").innerText = kpi.exc;
            document.getElementById("countBom").innerText = kpi.bom;
            document.getElementById("countInsatisfeito").innerText = kpi.ins;
            document.getElementById("totalVisitas").innerText = kpi.visitas;

            renderizarGrafico();
        }

        function renderizarGrafico() {
            const ctx = document.getElementById("clienteChart").getContext("2d");
            if (chartRef) chartRef.destroy();

            chartRef = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: baseDeDados.map(d => d.nome),
                    datasets: [{
                        data: baseDeDados.map(() => 10),
                        backgroundColor: baseDeDados.map(d => d.cor),
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { display: false },
                        x: { ticks: { color: 'white', font: { size: 10 }, maxRotation: 45, minRotation: 45 } }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { callbacks: { label: (item) => baseDeDados[item.dataIndex].texto } }
                    },
                    onClick: (e, el) => {
                        if (el.length > 0) {
                            const i = el[0].index;
                            document.getElementById("modalTitle").innerText = baseDeDados[i].nome;
                            document.getElementById("modalBody").innerText = baseDeDados[i].texto;
                            document.getElementById("feedbackModal").style.display = "block";
                        }
                    }
                }
            });
        }

        function closeModal() { document.getElementById("feedbackModal").style.display = "none"; }
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
